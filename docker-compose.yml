# MediaBox - Emby 媒体库管理系统 Docker 配置

## 快速开始

### 方式一：使用 Docker Compose（推荐）

```bash
# 启动服务
docker-compose up -d

# 查看日志
docker-compose logs -f
```

### 方式二：使用 Docker Run

```bash
docker run -d \
  --name mediabox \
  -p 5000:5000 \
  -v ./data:/app/data \
  -v ./logs:/app/logs \
  -v ./settings.json:/app/settings.json \
  -e EMBY_SERVER_URL=http://your-emby-server:8096 \
  -e EMBY_API_KEY=your-api-key \
  --restart unless-stopped \
  ghcr.io/yourusername/mediabox:latest
```

## 环境变量

| 变量名 | 说明 | 默认值 |
|--------|------|--------|
| `FLASK_ENV` | 运行环境 | `production` |
| `EMBY_SERVER_URL` | Emby 服务器地址 | - |
| `EMBY_API_KEY` | Emby API Key | - |
| `SECRET_KEY` | Flask 密钥 | 随机生成 |

## 数据持久化

- `./data` - SQLite 数据库
- `./logs` - 应用日志
- `./settings.json` - 配置文件

## 构建镜像

```bash
# 构建
docker build -t mediabox .

# 运行
docker run -d -p 5000:5000 -v $(pwd)/data:/app/data mediabox
```

## Docker Hub / GHCR

```bash
# 登录
docker login ghcr.io

# 推送
docker tag mediabox ghcr.io/yourusername/mediabox:latest
docker push ghcr.io/yourusername/mediabox:latest
```
