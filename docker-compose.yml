version: '3.8'

services:
  mediabox:
    image: ghcr.io/qq1394179649/mediabox:latest
    # 如需本地构建，取消注释下面一行，注释上面一行
    # build: .
    container_name: mediabox
    ports:
      - "5000:5000"
      - "8097:8097"  # Emby 反代端口
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./settings.json:/app/settings.json
    environment:
      - FLASK_ENV=production
      # - EMBY_SERVER_URL=http://your-emby-server:8096
      # - EMBY_API_KEY=your-api-key
      # - SECRET_KEY=change-this-to-a-random-string
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
