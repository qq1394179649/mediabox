# ============================================
# MediaBox - docker-compose.yml
# Emby 媒体库管理系统
# ============================================
#
# 使用方式:
#   首次部署:         docker-compose up -d mediabox
#   查看日志:         docker-compose logs -f
#   停止服务:         docker-compose down
#
# 首次使用:
#   1. 创建空配置文件: touch settings.json
#   2. 启动服务: docker-compose up -d mediabox
#   3. 访问 http://localhost:5000 完成初始化
#
# ============================================

services:
  # ---------- MediaBox 管理面板 ----------
  mediabox:
    image: ghcr.io/qq1394179649/mediabox:latest
    container_name: mediabox
    restart: unless-stopped
    
    ports:
      - "5000:5000"    # MediaBox Web 界面
      - "8097:8097"    # Emby 反代端口（可选）

    volumes:
      - ./data:/app/data         # SQLite 数据库
      - ./logs:/app/logs         # 应用日志
      - ./settings.json:/app/settings.json  # 配置文件

    environment:
      - TZ=Asia/Shanghai         # 时区
      # ↓↓↓ 首次部署请取消注释并填写 ↓↓↓
      # - EMBY_SERVER_URL=http://emby:8096
      # - EMBY_API_KEY=your_emby_api_key_here
      # - SECRET_KEY=your_random_secret_key_here

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - mediabox-net

  # ---------- 可选: Emby Server ----------
  # 如果你还没有 Emby 服务器，可以取消注释以下配置启用
  # emby:
  #   image: emby/embyserver:latest
  #   container_name: emby
  #   restart: unless-stopped
  #   environment:
  #     - TZ=Asia/Shanghai
  #   ports:
  #     - "8096:8096"    # Emby Web
  #     - "8920:8920"    # HTTPS（可选）
  #   volumes:
  #     - emby-config:/config
  #     - emby-cache:/cache
  #     - /path/to/your/media:/media  # 媒体文件目录，修改为实际路径
  #   networks:
  #     - mediabox-net

# ---------- 数据卷 ----------
volumes:
  # emby-config:  # 取消注释以启用 Emby
  # emby-cache:    # 取消注释以启用 Emby

# ---------- 网络 ----------
networks:
  mediabox-net:
    driver: bridge
