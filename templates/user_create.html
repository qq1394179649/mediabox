{% extends "base.html" %}

{% block title %}创建用户 - Emby管理系统{% endblock %}
{% block topbar_title %}➕ 创建用户{% endblock %}

{% block content %}
<div class="card fade-in" style="max-width:600px;">
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label for="name">用户名 *</label>
                <input type="text" id="name" name="name" class="form-control"
                       placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">初始密码</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="留空则不设置密码">
            </div>
            <div class="form-group">
                <label for="template_id">权限模板</label>
                <select id="template_id" name="template_id" class="form-control">
                    <option value="">-- 使用默认模板 --</option>
                    {% for t in templates %}
                    <option value="{{ t.id }}">{{ t.name }}{% if t.is_default %} (默认){% endif %}</option>
                    {% endfor %}
                </select>
                <small class="text-muted">选择后将自动应用该模板的Emby用户策略</small>
            </div>
            <div class="emby-preview" id="embyPreview" style="display: none;">
                <label>Emby权限预览</label>
                <div class="preview-grid" id="previewGrid"></div>
            </div>
            <div class="d-flex gap-1 mt-3">
                <button type="submit" class="btn btn-primary">✅ 创建用户</button>
                <a href="{{ url_for('users_list') }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>

<style>
.emby-preview {
    margin-top: 16px;
    padding: 16px;
    background: var(--bg-secondary);
    border-radius: 8px;
    border: 1px solid var(--border);
}

.emby-preview label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 12px;
    display: block;
}

.preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
}

.preview-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 6px 10px;
    background: var(--bg-tertiary);
    border-radius: 4px;
}

.preview-item .icon {
    width: 14px;
    height: 14px;
}

.preview-item.enabled {
    background: rgba(34, 197, 94, 0.1);
    color: #22c55e;
}

.preview-item.disabled {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
}
</style>

<script>
// 获取模板权限数据
const templatePermissions = {
    {% for t in templates %}
    {{ t.id }}: {{ t.permissions | tojson | safe }},
    {% endfor %}
};

const templateSelect = document.getElementById('template_id');
const preview = document.getElementById('embyPreview');
const previewGrid = document.getElementById('previewGrid');

const permLabels = {
    'video_transcoding': '视频转码',
    'audio_transcoding': '音频转码',
    'remuxing': '直接流',
    'media_conversion': '媒体转换',
    'media_playback': '媒体播放',
    'remote_access': '远程访问',
    'live_tv': '电视直播',
    'content_downloading': '内容下载',
    'subtitle_download': '字幕下载',
    'content_deletion': '内容删除',
    'is_admin': '管理员',
    'is_hidden': '隐藏用户',
    'is_disabled': '禁用账户',
    'bitrate_limit': '码率限制'
};

function updatePreview(templateId) {
    if (!templateId) {
        // 显示默认模板预览
        templateId = {{ default_template_id or 'null' }};
    }
    
    const perms = templatePermissions[templateId];
    if (!perms || !perms.emby) {
        preview.style.display = 'none';
        return;
    }
    
    preview.style.display = 'block';
    previewGrid.innerHTML = '';
    
    const emby = perms.emby;
    for (const [key, label] of Object.entries(permLabels)) {
        if (key === 'bitrate_limit') {
            const value = emby[key] || 0;
            const item = document.createElement('div');
            item.className = 'preview-item';
            item.innerHTML = `<span>${label}:</span><strong>${value > 0 ? value + 'K' : '不限'}</strong>`;
            previewGrid.appendChild(item);
        } else {
            const item = document.createElement('div');
            item.className = `preview-item ${emby[key] ? 'enabled' : 'disabled'}`;
            item.innerHTML = `
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    ${emby[key] 
                        ? '<polyline points="20 6 9 17 4 12"/>' 
                        : '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'}
                </svg>
                <span>${label}</span>
            `;
            previewGrid.appendChild(item);
        }
    }
}

templateSelect.addEventListener('change', () => updatePreview(templateSelect.value));

// 初始显示
updatePreview();
</script>
{% endblock %}
